server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # Allow Google OAuth popup to communicate back to the main window
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # ── SPA routing: all routes fall back to index.html ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy /api requests to backend ───────────────────────────────
    location /api/ {
        proxy_pass BACKEND_URL_PLACEHOLDER/;

        # Crucial for proxying to HTTPS upstreams (like Railway/Render)
        proxy_ssl_server_name on;

        # Do not override Host header with $host, let it use $proxy_host
        # so external PaaS routers can route it correctly.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static assets: cache aggressively (Vite uses content-hashed filenames) ──
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Still allow Google OAuth headers
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        access_log off;
    }

    # ── index.html: never cache so updates land immediately ──────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    }

    # ── Gzip compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
